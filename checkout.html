<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | LuxeMarket</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="checkout-layout">
        
        <div class="checkout-form-area">
            <div class="checkout-header">
                <a href="index.html" class="logo">Luxe<span>Market</span>.</a>
                <nav class="checkout-breadcrumb">
                    <a href="cart.html">Cart</a> <i class="fas fa-chevron-right"></i> <span class="active">Checkout</span>
                </nav>
            </div>

            <form id="checkoutForm" onsubmit="processOrder(event)">
                
                <div class="form-section">
                    <h3>Contact Information</h3>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Shipping Address</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" placeholder="123 Main St" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>City</label>
                            <input type="text" required>
                        </div>
                        <div class="form-group">
                            <label>Postal Code</label>
                            <input type="text" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Payment</h3>
                    <p class="secure-notice"><i class="fas fa-lock"></i> All transactions are secure and encrypted.</p>
                    
                    <div class="payment-selector">
                        <label class="payment-option selected">
                            <input type="radio" name="payment" checked>
                            <span>Credit Card</span>
                            <div class="icons"><i class="fab fa-cc-visa"></i> <i class="fab fa-cc-mastercard"></i></div>
                        </label>
                        <div class="payment-details">
                            <div class="form-group">
                                <input type="text" placeholder="Card Number" required>
                            </div>
                            <div class="form-row">
                                <input type="text" placeholder="MM / YY" required>
                                <input type="text" placeholder="CVC" required>
                            </div>
                        </div>

                        <label class="payment-option">
                            <input type="radio" name="payment">
                            <span>PayPal</span>
                            <i class="fab fa-paypal"></i>
                        </label>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="payButton">Pay $470.40</button>
            </form>
            
            <div class="footer-links">
                <a href="#">Returns Policy</a>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
            </div>
        </div>

        <div class="checkout-summary-area">
            <div class="checkout-items">
                <div class="summary-item">
                    <div class="img-wrapper">
                        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=100&q=80">
                        <span class="qty-badge">1</span>
                    </div>
                    <div class="info">
                        <p>Wireless Headphones</p>
                        <small>Black</small>
                    </div>
                    <div class="price">$249.00</div>
                </div>
                <div class="summary-item">
                    <div class="img-wrapper">
                        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&fit=crop&w=100&q=80">
                        <span class="qty-badge">1</span>
                    </div>
                    <div class="info">
                        <p>Smart Watch</p>
                        <small>Silver</small>
                    </div>
                    <div class="price">$199.00</div>
                </div>
            </div>

            <div class="totals-block">
                <div class="row">
                    <span>Subtotal</span>
                    <span>$448.00</span>
                </div>
                <div class="row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="row">
                    <span>Tax</span>
                    <span>$22.40</span>
                </div>
                <div class="row total-row">
                    <span>Total</span>
                    <span>$470.40</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
