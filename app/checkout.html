<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | AvinashMarket</title>
    <link rel="icon" type="image/jpeg" href="images/avinash_logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

<header class="header" role="banner">
    <div class="container">
        <div class="header-main" style="height:60px;">
            <a href="index.html" class="header-logo" style="font-size:1.5rem;">Avi<span>nash</span></a>
            <div class="text-sm text-muted"><i class="fas fa-lock" style="color:var(--success);"></i> Secure Checkout</div>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <div class="checkout-steps">
            <div class="checkout-step completed"><span class="step-num"><i class="fas fa-check"></i></span><span>Cart</span></div>
            <div class="checkout-step-divider"></div>
            <div class="checkout-step active"><span class="step-num">2</span><span>Checkout</span></div>
            <div class="checkout-step-divider"></div>
            <div class="checkout-step"><span class="step-num">3</span><span>Confirmation</span></div>
        </div>

        <div class="checkout-layout">
            <div>
                <form id="checkout-form" onsubmit="processCheckout(event)">
                    <div class="checkout-section">
                        <h3><i class="fas fa-user" style="color:var(--primary);margin-right:0.5rem;"></i> Contact Information</h3>
                        <div class="form-row">
                            <div class="form-group"><label>First Name *</label><input type="text" class="input-field" required placeholder="John"></div>
                            <div class="form-group"><label>Last Name *</label><input type="text" class="input-field" required placeholder="Doe"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>Email *</label><input type="email" class="input-field" required placeholder="john@example.com"></div>
                            <div class="form-group"><label>Phone *</label><input type="tel" class="input-field" required placeholder="+1 (555) 000-0000"></div>
                        </div>
                    </div>

                    <div class="checkout-section">
                        <h3><i class="fas fa-map-marker-alt" style="color:var(--primary);margin-right:0.5rem;"></i> Shipping Address</h3>
                        <div class="form-group"><label>Street Address *</label><input type="text" class="input-field" required placeholder="123 Main Street"></div>
                        <div class="form-group"><label>Apt, Suite, etc. (optional)</label><input type="text" class="input-field" placeholder="Apt 4B"></div>
                        <div class="form-row">
                            <div class="form-group"><label>City *</label><input type="text" class="input-field" required placeholder="New York"></div>
                            <div class="form-group"><label>State *</label><input type="text" class="input-field" required placeholder="NY"></div>
                        </div>
                        <div class="form-row">
                            <div class="form-group"><label>ZIP Code *</label><input type="text" class="input-field" required placeholder="10001"></div>
                            <div class="form-group"><label>Country *</label><select class="select-field"><option>United States</option><option>Canada</option><option>United Kingdom</option></select></div>
                        </div>
                    </div>

                    <div class="checkout-section">
                        <h3><i class="fas fa-credit-card" style="color:var(--primary);margin-right:0.5rem;"></i> Payment Method</h3>
                        <div class="payment-methods">
                            <label class="payment-method selected"><input type="radio" name="payment" value="card" checked><i class="fas fa-credit-card"></i><div><span class="payment-label">Credit / Debit Card</span><span class="text-muted text-sm" style="display:block;">Visa, Mastercard, Amex</span></div></label>
                            <label class="payment-method"><input type="radio" name="payment" value="paypal"><i class="fab fa-paypal" style="color:#003087;"></i><div><span class="payment-label">PayPal</span><span class="text-muted text-sm" style="display:block;">Pay with your PayPal account</span></div></label>
                            <label class="payment-method"><input type="radio" name="payment" value="apple"><i class="fab fa-apple-pay" style="font-size:1.5rem;"></i><div><span class="payment-label">Apple Pay</span><span class="text-muted text-sm" style="display:block;">Fast and secure</span></div></label>
                        </div>
                        <div id="card-fields" style="margin-top:1.5rem;">
                            <div class="form-group"><label>Card Number *</label><input type="text" class="input-field" placeholder="4242 4242 4242 4242" maxlength="19"></div>
                            <div class="form-row">
                                <div class="form-group"><label>Expiry Date *</label><input type="text" class="input-field" placeholder="MM/YY" maxlength="5"></div>
                                <div class="form-group"><label>CVV *</label><input type="text" class="input-field" placeholder="123" maxlength="4"></div>
                            </div>
                        </div>
                        <p class="text-xs text-muted" style="margin-top:1rem;"><i class="fas fa-shield-alt" style="color:var(--success);"></i> Your payment information is encrypted and secure.</p>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg btn-block" id="pay-btn"><i class="fas fa-lock"></i> Place Order</button>
                </form>
            </div>

            <div class="checkout-order-summary">
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div id="checkout-items"></div>
                    <div style="border-top:1px solid var(--border-light);margin-top:1rem;padding-top:1rem;">
                        <div class="summary-row"><span class="label">Subtotal</span><span class="value" id="ck-subtotal"></span></div>
                        <div class="summary-row"><span class="label">Shipping</span><span class="value" id="ck-shipping"></span></div>
                        <div class="summary-row"><span class="label">Tax</span><span class="value" id="ck-tax"></span></div>
                        <div class="summary-row total"><span>Total</span><span id="ck-total"></span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<script src="js/products.js"></script>
<script src="js/app.js"></script>
<script>
(function() {
    const itemsDiv = document.getElementById('checkout-items');
    let subtotal = 0;
    itemsDiv.innerHTML = App.cart.map(item => {
        const p = getProductById(item.id);
        if (!p) return '';
        subtotal += p.price * item.qty;
        return `<div class="summary-item" style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;">
            <div style="width:56px;height:56px;border-radius:var(--radius-md);overflow:hidden;background:var(--bg-tertiary);position:relative;flex-shrink:0;">
                <img src="${p.images[0]}" alt="${p.name}" style="width:100%;height:100%;object-fit:cover;">
                <span style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;background:var(--text-muted);color:white;border-radius:50%;font-size:0.65rem;display:flex;align-items:center;justify-content:center;">${item.qty}</span>
            </div>
            <div style="flex:1;"><p style="font-size:var(--text-sm);font-weight:500;line-height:1.3;">${p.name}</p></div>
            <span style="font-weight:600;font-size:var(--text-sm);">$${(p.price*item.qty).toFixed(2)}</span>
        </div>`;
    }).join('');
    const shipping = subtotal >= 100 ? 0 : 9.99;
    const tax = subtotal * 0.05;
    const total = subtotal + shipping + tax;
    document.getElementById('ck-subtotal').textContent = '$' + subtotal.toFixed(2);
    document.getElementById('ck-shipping').textContent = shipping === 0 ? 'FREE' : '$' + shipping.toFixed(2);
    document.getElementById('ck-shipping').style.color = shipping === 0 ? 'var(--success)' : 'inherit';
    document.getElementById('ck-tax').textContent = '$' + tax.toFixed(2);
    document.getElementById('ck-total').textContent = '$' + total.toFixed(2);

    document.querySelectorAll('.payment-method').forEach(m => {
        m.addEventListener('click', () => {
            document.querySelectorAll('.payment-method').forEach(x => x.classList.remove('selected'));
            m.classList.add('selected');
            m.querySelector('input').checked = true;
            document.getElementById('card-fields').style.display = m.querySelector('input').value === 'card' ? 'block' : 'none';
        });
    });

    window.processCheckout = function(e) {
        e.preventDefault();
        const btn = document.getElementById('pay-btn');
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
        btn.disabled = true;
        setTimeout(() => {
            btn.innerHTML = '<i class="fas fa-check"></i> Order Placed!';
            btn.style.background = 'var(--success)';
            App.cart = [];
            App.saveState();
            App.updateCartBadge();
            setTimeout(() => { window.location.href = 'order-tracking.html'; }, 1500);
        }, 2000);
    };
})();
</script>
</body>
</html>
