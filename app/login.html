<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | AvinashMarket</title>
    <link rel="icon" type="image/jpeg" href="images/avinash_logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

<header class="header" role="banner">
    <div class="container"><div class="header-main" style="height:60px;"><a href="index.html" class="header-logo" style="font-size:1.5rem;">Avi<span>nash</span></a><a href="shop.html" class="text-sm text-muted"><i class="fas fa-arrow-left"></i> Back to Shopping</a></div></div>
</header>

<main class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Sign in to your account to continue shopping</p>
        </div>
        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="login-email">Email Address</label>
                <div class="input-group">
                    <i class="fas fa-envelope input-icon-left"></i>
                    <input type="email" id="login-email" class="input-field" placeholder="you@example.com" required>
                </div>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <div class="input-group">
                    <i class="fas fa-lock input-icon-left"></i>
                    <input type="password" id="login-password" class="input-field" placeholder="Enter your password" required>
                    <i class="fas fa-eye input-icon-right" id="toggle-pw" style="cursor:pointer;"></i>
                </div>
            </div>
            <div class="flex items-center justify-between" style="margin-bottom:1.5rem;">
                <label class="checkbox-group"><input type="checkbox"> <span class="text-sm">Remember me</span></label>
                <a href="#" class="text-sm text-primary font-semibold">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-block" id="login-btn">Sign In</button>
        </form>
        <div class="auth-divider">or continue with</div>
        <div class="social-auth">
            <button class="social-btn google"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
        </div>
        <p class="auth-footer">Don't have an account? <a href="register.html">Create one</a></p>
        <p class="text-center text-xs text-muted" style="margin-top:1rem;"><i class="fas fa-shield-alt" style="color:var(--success);"></i> Your data is protected with 256-bit SSL encryption</p>
    </div>
</main>

<script src="js/app.js"></script>
<script>
document.getElementById('toggle-pw').addEventListener('click', function() {
    const pw = document.getElementById('login-password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
    this.classList.toggle('fa-eye'); this.classList.toggle('fa-eye-slash');
});
function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...'; btn.disabled = true;
    setTimeout(() => {
        App.user = { name: 'User', email: document.getElementById('login-email').value };
        App.saveState();
        btn.innerHTML = '<i class="fas fa-check"></i> Success!'; btn.style.background = 'var(--success)';
        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
    }, 1500);
}
</script>
</body>
</html>
