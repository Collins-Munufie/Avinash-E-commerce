<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | AvinashMarket</title>
    <link rel="icon" type="image/jpeg" href="images/avinash_logo.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
<header class="header"><div class="container"><div class="header-main" style="height:60px;"><a href="index.html" class="header-logo" style="font-size:1.5rem;">Avi<span>nash</span></a><a href="login.html" class="text-sm text-muted">Already have an account? <span class="text-primary font-semibold">Sign In</span></a></div></div></header>
<main class="auth-container">
    <div class="auth-card" style="max-width:500px;">
        <div class="auth-header"><h1>Create Account</h1><p>Join AvinashMarket for exclusive deals and faster checkout</p></div>
        <form onsubmit="handleRegister(event)">
            <div class="form-row">
                <div class="form-group"><label>First Name *</label><input type="text" class="input-field" placeholder="John" required></div>
                <div class="form-group"><label>Last Name *</label><input type="text" class="input-field" placeholder="Doe" required></div>
            </div>
            <div class="form-group"><label>Email Address *</label><input type="email" class="input-field" placeholder="you@example.com" required></div>
            <div class="form-group"><label>Password *</label><input type="password" class="input-field" placeholder="Min 8 characters" required minlength="8"></div>
            <div class="form-group"><label>Confirm Password *</label><input type="password" class="input-field" placeholder="Re-enter password" required></div>
            <label class="checkbox-group" style="margin-bottom:1.5rem;"><input type="checkbox" required> <span class="text-sm">I agree to the <a href="#" class="text-primary">Terms of Service</a> and <a href="#" class="text-primary">Privacy Policy</a></span></label>
            <button type="submit" class="btn btn-primary btn-lg btn-block" id="reg-btn">Create Account</button>
        </form>
        <div class="auth-divider">or sign up with</div>
        <div class="social-auth">
            <button class="social-btn google"><i class="fab fa-google"></i> Google</button>
            <button class="social-btn facebook"><i class="fab fa-facebook-f"></i> Facebook</button>
        </div>
        <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
</main>
<script src="js/app.js"></script>
<script>
function handleRegister(e) { e.preventDefault(); const btn = document.getElementById('reg-btn'); btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account...'; btn.disabled = true; setTimeout(() => { btn.innerHTML = '<i class="fas fa-check"></i> Account Created!'; btn.style.background = 'var(--success)'; setTimeout(() => { window.location.href = 'login.html'; }, 1500); }, 2000); }
</script>
</body>
</html>
